<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Marché Nova</title><style>
body{margin:0;font-family:Arial;background:#f4f7fb;color:#17202a}.top{position:sticky;top:0;z-index:2;display:flex;gap:14px;align-items:center;padding:14px 24px;background:#111827;color:white}.brand{font-weight:900;font-size:22px}.search{flex:1;display:flex}.search input,.search select{padding:12px;border:0}.search input{flex:1}.search button,.mainbtn{border:0;background:#ffce57;padding:12px 18px;font-weight:800}.cartbtn{background:#1769e0;color:white;border:0;border-radius:6px;padding:12px 16px}.hero{display:grid;grid-template-columns:1fr 1fr;gap:28px;padding:54px 7vw;background:linear-gradient(135deg,#fff7df,#e9f8ff)}h1{font-size:64px;margin:0}.hero p{font-size:18px;line-height:1.5}.visual{display:grid;grid-template-columns:1fr 1fr;gap:14px}.tile{min-height:150px;border-radius:8px;background:white;box-shadow:0 12px 30px #0002;padding:18px;display:flex;align-items:end;font-weight:900}.layout{display:grid;grid-template-columns:230px 1fr;gap:20px;padding:28px 7vw}.filters,.card,.cart{background:white;border:1px solid #dde3ea;border-radius:8px}.filters{padding:16px;height:max-content}.filters label{display:block;margin:14px 0}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}.card{overflow:hidden}.pic{height:160px;background:var(--art);display:flex;align-items:start;padding:10px}.badge{background:#e75d45;color:white;border-radius:20px;padding:6px 10px;font-size:12px;font-weight:800}.info{padding:14px}.price{color:#b42318;font-size:24px;font-weight:900}.old{text-decoration:line-through;color:#667085}.row{display:flex;justify-content:space-between;gap:10px}.add{width:100%;margin-top:12px;border:0;border-radius:6px;background:#138a5b;color:white;padding:12px;font-weight:800}.cart{position:fixed;right:18px;top:78px;width:330px;max-height:75vh;overflow:auto;padding:16px;box-shadow:0 20px 45px #0003;display:none}.cart.open{display:block}.cartitem{border-bottom:1px solid #dde3ea;padding:10px 0}.empty{padding:30px;text-align:center;color:#667085;background:white;border-radius:8px}@media(max-width:800px){.hero,.layout{grid-template-columns:1fr}h1{font-size:42px}.top{flex-wrap:wrap}.search{order:3;flex-basis:100%}.cart{left:12px;right:12px;width:auto}}
</style></head><body>
<header class="top"><div class="brand">Marché Nova</div><form class="search" id="search"><select id="cat"><option value="all">Toutes</option><option value="tech">Tech</option><option value="home">Maison</option><option value="mode">Mode</option></select><input id="q" placeholder="Rechercher un produit..."><button>⌕</button></form><button class="cartbtn" id="cartBtn">Panier <b id="count">0</b></button></header>
<section class="hero"><div><p>Livraison rapide • Prix vendeurs • Retours simples</p><h1>Marché Nova</h1><p>Une base de site comme Amazon ou AliExpress : catalogue, filtres, fiches produits et panier.</p><button class="mainbtn" onclick="document.querySelector('#catalogue').scrollIntoView()">Voir les offres</button></div><div class="visual"><div class="tile">Ordinateurs dès 699 €</div><div class="tile">Montres -34%</div><div class="tile">Maison express</div><div class="tile">Mode & accessoires</div></div></section>
<main class="layout" id="catalogue"><aside class="filters"><h2>Filtres</h2><label>Tri <select id="sort"><option value="pop">Populaires</option><option value="asc">Prix croissant</option><option value="desc">Prix décroissant</option></select></label><label><input type="checkbox" id="free"> Livraison gratuite</label><label>Prix max <input type="range" id="max" min="20" max="900" value="900"></label><b id="maxLabel">900 €</b></aside><section><h2 id="title">Produits populaires</h2><div class="grid" id="grid"></div></section></main>
<aside class="cart" id="cart"><h2>Panier</h2><div id="cartItems"></div><h3>Total : <span id="total">0 €</span></h3></aside>
<script>
const P=[["UltraBook Air","tech",699,899,4.8,1,"linear-gradient(135deg,#111827,#5fd0ff)"],["Montre Pulse","tech",79,119,4.6,1,"radial-gradient(circle,#111827 30%,#4ed09a 32% 48%,#eee 49%)"],["Casque Studio","tech",129,179,4.7,1,"linear-gradient(135deg,#1769e0,#111827)"],["Lampe Halo","home",39,59,4.5,0,"radial-gradient(circle,#ffce57 25%,#1769e0 26% 45%,#eee 46%)"],["Organisateur cuisine","home",28,44,4.4,1,"linear-gradient(90deg,#4ed09a,#ffce57,#e75d45)"],["Veste imperméable","mode",89,139,4.6,0,"linear-gradient(135deg,#1769e0,#111827)"]].map((x,i)=>({id:i+1,n:x[0],c:x[1],p:x[2],o:x[3],r:x[4],f:x[5],a:x[6]}));
let cart={};const euro=n=>n.toLocaleString("fr-FR",{style:"currency",currency:"EUR",maximumFractionDigits:0});
function render(){let q=document.querySelector("#q").value.toLowerCase(),cat=document.querySelector("#cat").value,free=document.querySelector("#free").checked,max=+document.querySelector("#max").value,sort=document.querySelector("#sort").value;
document.querySelector("#maxLabel").textContent=euro(max);let L=P.filter(p=>(cat=="all"||p.c==cat)&&p.n.toLowerCase().includes(q)&&(!free||p.f)&&p.p<=max);if(sort=="asc")L.sort((a,b)=>a.p-b.p);if(sort=="desc")L.sort((a,b)=>b.p-a.p);
grid.innerHTML=L.length?L.map(p=>`<article class="card"><div class="pic" style="--art:${p.a}"><span class="badge">${p.f?"Livraison gratuite":"Promo"}</span></div><div class="info"><h3>${p.n}</h3><div><span class="price">${euro(p.p)}</span> <span class="old">${euro(p.o)}</span></div><p>★ ${p.r}</p><button class="add" onclick="add(${p.id})">Ajouter au panier</button></div></article>`).join(""):`<div class="empty">Aucun produit trouvé.</div>`;renderCart()}
function add(id){cart[id]=(cart[id]||0)+1;renderCart()}function renderCart(){let rows=Object.entries(cart).map(([id,q])=>{let p=P.find(x=>x.id==id);return `<div class="cartitem"><b>${p.n}</b><br>${q} × ${euro(p.p)}</div>`});cartItems.innerHTML=rows.join("")||"Panier vide";count.textContent=Object.values(cart).reduce((a,b)=>a+b,0);total.textContent=euro(Object.entries(cart).reduce((s,[id,q])=>s+P.find(p=>p.id==id).p*q,0))}
search.onsubmit=e=>{e.preventDefault();render()};cat.onchange=sort.onchange=free.onchange=max.oninput=render;cartBtn.onclick=()=>cart.classList.toggle("open");render();
</script></body></html>
